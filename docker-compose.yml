name: dialer

# Self-contained stack: the dialer app + its OWN Cloudflare tunnel.
# Does not touch the /opt/visark stack or its network.

services:
  dialer:
    build: .
    restart: unless-stopped
    # .env holds the secrets; mounted read-only and loaded by python-dotenv in
    # app.py (which strips the inline comments that env_file would choke on).
    volumes:
      - ./.env:/app/.env:ro
      # Serve the live frontend so UI tweaks need only a restart, not a rebuild.
      - ./static:/app/static:ro
      # Durable storage for call/message logs + recordings (survives restarts).
      - ./data:/app/data
    # No `ports:` — not published to the host. Reached only by cloudflared below,
    # over this project's default network, as http://dialer:3001.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Token for THIS dialer's dedicated tunnel. Create the tunnel in
      # Zero Trust > Networks > Tunnels, then set CLOUDFLARE_TUNNEL_TOKEN in .env.
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on: [dialer]
