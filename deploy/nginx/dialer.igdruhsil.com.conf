# nginx site config for the Visark dialer.
# Place at: /etc/nginx/sites-available/dialer.igdruhsil.com.conf
# then symlink into sites-enabled (see deploy/README.md).
#
# Design:
#  - TLS terminated here (Let's Encrypt).
#  - Single-user HTTP basic auth on the UI + /api/token.
#  - Twilio webhook paths are EXCLUDED from basic auth — Twilio cannot send
#    credentials. Those endpoints validate the Twilio request signature
#    (X-Twilio-Signature) in the app instead.
#  - WebRTC media is peer-to-peer UDP between the browser and Twilio's edge;
#    nginx only carries plain HTTPS (page, token, webhooks), so no special
#    WebSocket/UDP handling is needed here.

server {
    listen 80;
    listen [::]:80;
    server_name dialer.igdruhsil.com;
    # Force HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dialer.igdruhsil.com;

    # --- TLS (created by: certbot certonly --standalone -d dialer.igdruhsil.com) ---
    ssl_certificate     /etc/letsencrypt/live/dialer.igdruhsil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dialer.igdruhsil.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Common proxy headers (inherited by the location blocks below)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Twilio webhooks: NO basic auth (protect via signature validation in app) ---
    location = /api/twiml/outbound { auth_basic off; proxy_pass http://127.0.0.1:3001; }
    location = /api/twiml/inbound  { auth_basic off; proxy_pass http://127.0.0.1:3001; }
    location = /api/call-status    { auth_basic off; proxy_pass http://127.0.0.1:3001; }
    location = /api/sms/inbound    { auth_basic off; proxy_pass http://127.0.0.1:3001; }

    # --- Everything else (UI, /api/token, status polling): basic auth ---
    location / {
        auth_basic           "Visark Dialer";
        auth_basic_user_file /etc/nginx/.dialer_htpasswd;
        proxy_pass           http://127.0.0.1:3001;
    }
}
